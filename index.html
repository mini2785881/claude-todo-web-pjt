<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 할 일</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-wrap" id="auth-view">
    <div class="auth-card">
      <h1 class="auth-title">오늘의 할 일</h1>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">로그인</button>
        <button type="button" class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="이메일" autocomplete="email">
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password">
        <button type="submit" class="auth-submit">로그인</button>
        <p class="auth-message" id="login-message"></p>
      </form>

      <form id="signup-form" class="auth-form" hidden>
        <input type="email" id="signup-email" placeholder="이메일" autocomplete="email">
        <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password">
        <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인" autocomplete="new-password">
        <button type="submit" class="auth-submit">회원가입</button>
        <p class="auth-message" id="signup-message"></p>
      </form>
    </div>
  </div>

  <div class="app" id="app-view" hidden>
    <header class="app-header">
      <div class="user-bar">
        <span id="current-user-label"></span>
        <button type="button" id="logout-btn">로그아웃</button>
      </div>
      <h1>오늘의 할 일</h1>
      <div class="progress-area">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">0%</span>
      </div>
    </header>

    <section class="input-area">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요" autocomplete="off">
      <select id="category-select">
        <option value="개인">개인</option>
        <option value="공부">공부</option>
        <option value="업무">업무</option>
        <option value="취미">취미</option>
      </select>
      <button type="button" id="add-btn">추가</button>
    </section>

    <nav class="filter-area" id="filter-area">
      <button class="filter-btn active" data-filter="전체">전체</button>
      <button class="filter-btn" data-filter="개인">개인</button>
      <button class="filter-btn" data-filter="공부">공부</button>
      <button class="filter-btn" data-filter="업무">업무</button>
      <button class="filter-btn" data-filter="취미">취미</button>
    </nav>

    <ul id="todo-list"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
